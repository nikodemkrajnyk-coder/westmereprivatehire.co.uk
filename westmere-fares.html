<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#B8985A;--gold2:#C9A96E;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost','Helvetica Neue',Arial,sans-serif}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--sans);font-weight:300;color:#fff;background-color:#111D2C;background-image:url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=2000&q=85&fm=jpg&fit=crop");background-attachment:fixed;background-size:cover;background-repeat:no-repeat;background-position:center 60%;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;image-rendering:-webkit-optimize-contrast;image-rendering:auto}
body::before{content:"";position:fixed;inset:0;background:rgba(10,8,4,.35);z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.9rem 6%;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
nav.solid{background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;padding-left:0;padding-right:0}
.brand{text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:.3rem;transition:opacity .3s ease}
nav.solid .brand{opacity:0;pointer-events:none;width:0;overflow:hidden;padding:0;margin:0}
nav.solid .nav-r{opacity:0;pointer-events:none;width:0;overflow:hidden;transition:opacity .3s ease}
nav.solid .burger{display:flex;position:fixed;top:1rem;right:6%;z-index:101}
.brand-name{font-family:var(--serif);font-size:1.4rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:#fff;line-height:1}
.brand-sub{font-size:1rem;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:#fff}
.brand-sub2{font-size:.8rem;color:#fff;letter-spacing:.38em;text-transform:uppercase;font-weight:300}
.nav-r{display:flex;align-items:center;gap:1.6rem;transition:opacity .3s ease}
.nav-r a{text-decoration:none;font-size:.72rem;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.82);transition:color .2s}
.nav-r a:hover,.nav-r a.on{color:var(--gold)}
.nav-links{display:flex;align-items:center;gap:1.6rem}
.nav-links a{text-decoration:none;font-size:.72rem;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.82);transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.nav-links a.on{color:#fff;opacity:1}
.nav-book{background:none!important;color:#fff!important;padding:.4rem 0;border-radius:0;font-weight:300!important;font-family:var(--serif);font-size:1.8rem;font-style:italic;text-decoration:none;letter-spacing:.04em;border:none}
.nav-book:hover{color:#fff!important;background:none!important}
.nav-socials{display:flex;gap:.85rem;align-items:center}
.nav-socials a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .25s;display:flex}
.nav-socials a:hover{color:var(--gold)}
.nav-socials svg{width:20px;height:20px}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;border:none;background:none;padding:4px;min-width:40px;min-height:40px;justify-content:center;align-items:center}
.burger span{display:block;width:20px;height:1.5px;background:#fff}
.mmenu{display:none;position:fixed;inset:0;background:rgba(17,29,44,.5);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:2.4rem}
.mmenu.open{display:flex}
.mmenu a{font-family:var(--serif);font-size:2rem;font-weight:300;color:rgba(255,255,255,.65);text-decoration:none;transition:color .2s}
.mmenu a:hover{color:var(--gold)}

/* FARES */
#fares{padding:10rem 6% 2rem;position:relative;z-index:1;box-sizing:border-box}
.fw{max-width:780px;margin:0 auto}
.tabs{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap;position:relative;z-index:10}
.tab-sub{font-size:.75rem;color:rgba(255,255,255,.6);letter-spacing:.08em;margin-bottom:.6rem;font-weight:300}
.tab{padding:.38rem 1.1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:30px;cursor:pointer;font-family:var(--sans);font-size:.6rem;font-weight:300;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.65);transition:all .2s;white-space:nowrap}
.tab:hover{color:#fff;background:rgba(255,255,255,.08)}
.tab.active{color:#fff;background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35);font-weight:400}
.panel{display:none}
.panel.show{display:block}
.ftable{width:100%;border-collapse:collapse}
.ftable tr{cursor:default;transition:background .15s}
.ftable tr:hover{background:rgba(255,255,255,.04)}
.ftable td{padding:.6rem .7rem;vertical-align:middle}
.dest{font-size:.92rem;font-weight:300;color:#fff;letter-spacing:.02em}
.meta{font-size:.64rem;color:rgba(255,255,255,.5);margin-top:.1rem;font-weight:300}
.prices{text-align:right;white-space:nowrap}
.prow{display:flex;justify-content:flex-end;align-items:baseline;gap:.55rem;line-height:1.7}
.ptype{font-size:.58rem;font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.price{font-family:var(--serif);font-size:1.25rem;font-weight:300;color:#fff}
.note{font-size:.72rem;color:rgba(255,255,255,.82);margin-top:1rem;line-height:1.9;font-weight:300}


@media(max-width:780px){body{background-attachment:scroll;background-size:cover}.nav-links,.nav-socials,.nav-book{display:none}.burger{display:flex}.brand-name{font-size:1.3rem;letter-spacing:.12em}}
@media(max-width:500px){.ftable td{padding:.5rem .4rem}}

footer.mini-foot{padding:1.1rem 6%;text-align:center;font-family:var(--sans);font-size:.66rem;letter-spacing:.1em;color:rgba(255,255,255,.38);background:rgba(13,10,6,.55);border-top:1px solid rgba(184,152,90,.12);position:relative;z-index:1}.mini-legal{margin-left:.6rem}.mini-legal a{color:rgba(255,255,255,.28);text-decoration:none;margin-left:.5rem;transition:color .2s;letter-spacing:.08em}.mini-legal a:hover{color:rgba(184,152,90,.7)}

<script>
/* ── Tab data ── */
var AREAS = [
  {id:"brighton", name:"Brighton", fares:[["Gatwick Airport","~27 mi · ~40 min",65,61],["Heathrow Airport","~58 mi · ~75 min",115,120],["Stansted Airport","~88 mi · ~100 min",194,198],["Luton Airport","~80 mi · ~95 min",185,189],["Southampton Airport","~48 mi · ~58 min",137,132],["London City Airport","~58 mi · ~80 min",149,154]]},
  {id:"lewes", name:"Lewes", fares:[["Gatwick Airport","~28 mi · ~38 min",70,67],["Heathrow Airport","~62 mi · ~80 min",126,131],["Stansted Airport","~92 mi · ~105 min",203,207],["Luton Airport","~85 mi · ~100 min",194,198],["Southampton Airport","~65 mi · ~72 min",144,140],["London City Airport","~68 mi · ~92 min",158,162]]},
  {id:"horsham", name:"Horsham", fares:[["Gatwick Airport","~12 mi · ~22 min",50,45],["Heathrow Airport","~38 mi · ~55 min",108,113],["Stansted Airport","~72 mi · ~90 min",162,167],["Luton Airport","~65 mi · ~82 min",140,144],["Southampton Airport","~48 mi · ~58 min",122,117],["London City Airport","~52 mi · ~78 min",144,149]]},
  {id:"sussex", name:"Sussex", sub:"Crawley · Worthing · Haywards Heath · Burgess Hill · Seaford · Eastbourne · Uckfield", fares:[["Crawley → Gatwick","~3 mi · ~10 min",32,29],["Crawley → Heathrow","~28 mi · ~45 min",86,90],["Worthing → Gatwick","~28 mi · ~38 min",65,61],["Worthing → Heathrow","~60 mi · ~78 min",117,122],["Haywards Heath → Gatwick","~18 mi · ~28 min",47,43],["Burgess Hill → Gatwick","~16 mi · ~25 min",43,40],["Eastbourne → Gatwick","~42 mi · ~55 min",88,85],["Eastbourne → Heathrow","~78 mi · ~95 min",146,150],["Seaford → Gatwick","~35 mi · ~45 min",83,79],["Uckfield → Gatwick","~22 mi · ~32 min",56,52]]}
];

/* ── Render everything via JS — guaranteed to work ── */
var tabsEl = document.getElementById("tabs");
var panelsEl = document.getElementById("panels");

AREAS.forEach(function(area, i) {
  /* Tab button */
  var btn = document.createElement("button");
  btn.type = "button";
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = area.name;
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelectorAll(".panel").forEach(function(p) { p.classList.remove("show"); });
    btn.classList.add("active");
    document.getElementById("p-" + area.id).classList.add("show");
  });
  tabsEl.appendChild(btn);

  /* Panel */
  var panel = document.createElement("div");
  panel.id = "p-" + area.id;
  panel.className = "panel" + (i === 0 ? " show" : "");
  var subHtml = area.sub ? '<div class="tab-sub">' + area.sub + '</div>' : '';
  var rows = "";
  area.fares.forEach(function(f) {
    rows += '<tr><td><div class="dest">' + f[0] + '</div><div class="meta">' + f[1] + '</div></td>'
          + '<td class="prices"><div class="prow"><span class="ptype">Drop-off</span><span class="price">£' + f[2] + '</span></div>'
          + '<div class="prow"><span class="ptype">Pickup</span><span class="price">£' + f[3] + '</span></div></td></tr>';
  });
  panel.innerHTML = subHtml + '<table class="ftable">' + rows + '</table>';
  panelsEl.appendChild(panel);
});
</script>
